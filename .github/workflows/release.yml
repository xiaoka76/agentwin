name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: build + publish + github release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 创建 GitHub Release 要写权限
      id-token: write   # 给 PyPI Trusted Publishing 留口子（可选）

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests
        run: uv run pytest -v

      - name: Build distributions
        run: uv build

      # 1) 先建 GitHub Release（成功→拿到官方下载页）
      # 2) 再尝试发 PyPI（缺 secret 也不挂，单独告警）
      # 这样保证：哪怕没配 PyPI token，GitHub Release 页也能照常生成

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true

      - name: Publish to PyPI
        # 缺 token / 0.1.0 已存在 时优雅跳过，不让整个 workflow 红
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          packages-dir: dist/
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
